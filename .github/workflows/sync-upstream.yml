name: Sync fork avec upstream

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 06:00 UTC
  workflow_dispatch:        # permet aussi de lancer à la main depuis l'onglet Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Synchroniser master depuis nextcloud/nextcloudpi
        run: gh repo sync TheWorms/nextcloudpi --branch master
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
